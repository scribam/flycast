name: BSD

on:
  push:
    branches-ignore:
      - 'l10n_**'
  pull_request:

jobs:
  build:
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        operating_system: [ dragonflybsd, freebsd, haiku, midnightbsd, netbsd, omnios, openbsd ]
        architecture: [ arm64, x86-64 ]
        libretro: [ OFF, ON ]
        include:
          - operating_system: dragonflybsd
            version: '6.4.2'
            pkginstall: sudo pkg update && sudo pkg install -y alsa-lib ccache cmake evdev-proto git libao libcdio libevdev libudev-devd libzip lua54 miniupnpc ninja pkgconf sdl2
          - operating_system: freebsd
            version: '15.0'
            pkginstall: sudo pkg upgrade -y && sudo pkg install -y alsa-lib ccache cmake evdev-proto git libao libcdio libevdev libudev-devd libzip lua54 miniupnpc ninja pkgconf pulseaudio sdl2
          - operating_system: haiku
            version: 'r1beta5'
            pkginstall: pkgman update -y && pkgman install -y ccache cmake curl_devel getconf git libao_devel libcdio_devel libiconv_devel libsdl2_devel libusb_devel libzip_devel lua_devel miniupnpc_devel ninja
          - operating_system: midnightbsd
            version: '4.0.4'
            pkginstall: sudo mport upgrade && sudo mport install alsa-lib ccache cmake evdev-proto git libao libcdio libevdev libudev-devd libzip lua54 miniupnpc ninja pkgconf pulseaudio sdl2 || true
          - operating_system: netbsd
            version: '10.1'
            pkginstall: sudo pkgin update && sudo pkgin -y install alsa-lib ccache clang cmake git libao libcdio libusb1-1.0.29 libzip lua54 miniupnpc ninja-build pkgconf pulseaudio SDL2
          - operating_system: omnios
            version: 'r151058'
            pkginstall: sudo pkg update || true && sudo pkg install build-essential ccache cmake git libzip ninja pkg-config
          - operating_system: openbsd
            version: '7.9'
            pkginstall: sudo pkg_add -u && sudo pkg_add ccache cmake git libao libcdio libusb1-1.0.29 libzip lua-5.4.8p0 miniupnpc ninja pulseaudio sdl2
        exclude:
          - operating_system: dragonflybsd
            architecture: arm64
          - operating_system: haiku
            architecture: arm64
          - operating_system: midnightbsd
            architecture: arm64
          - operating_system: omnios
            architecture: arm64

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.operating_system }}-${{ matrix.architecture }}-${{ github.sha }}
          restore-keys: ccache-${{ matrix.operating_system }}-${{ matrix.architecture }}-

      - name: Start VM
        uses: cross-platform-actions/action@v1
        with:
          operating_system: ${{ matrix.operating_system }}
          architecture: ${{ matrix.architecture }}
          version: ${{ matrix.version }}
          environment_variables: CCACHE_DIR

      - name: Set up build environment
        run: ${{ matrix.pkginstall }}
        shell: cpa.sh {0}

      - name: Reboot VM
        run: cpa.sh --reboot
        if: matrix.operating_system == 'haiku'

      - name: CMake
        run: |
          cmake -B build -DUSE_LIBCDIO=ON -DCMAKE_BUILD_TYPE=Release -G Ninja -DLIBRETRO=${{ matrix.libretro }}
          cmake --build build --config Release
        shell: cpa.sh {0}
